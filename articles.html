<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Force Trading YT — Choose Your Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0c0f;
    --surface:#15171c;
    --surface-hi:#1c1f26;
    --border:#292c33;
    --gold:#c9a24e;
    --gold-bright:#e8c77a;
    --text:#ededef;
    --muted:#8b8d95;
    --green:#34d399;
    --red:#f87171;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}

  .logo-img{
    width:44px;
    height:44px;
    object-fit:cover;
    border-radius:50%;
    border:1.5px solid var(--gold);
    display:block;
  }
  footer .logo-img{
    width:30px;
    height:30px;
  }
  footer .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }

  /* ---------- Hero ---------- */
  header{
    max-width:1100px;
    margin:0 auto;
    padding:60px 24px 36px;
    text-align:center;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.18em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  .eyebrow::before, .eyebrow::after{
    content:"";
    width:7px;height:7px;
    background:var(--gold);
    border-radius:50%;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(30px,5vw,46px);
    line-height:1.1;
    letter-spacing:-0.01em;
    margin-bottom:14px;
  }
  h1 em{ color:var(--gold); font-style:normal; }
  header p{
    color:var(--muted);
    font-size:16px;
    max-width:520px;
    margin:0 auto;
    line-height:1.6;
  }

  /* ---------- Grid ---------- */
  main{
    max-width:1100px;
    margin:0 auto;
    padding:20px 24px 40px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:16px;
    align-items:stretch;
  }
  .plan{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:26px 22px;
    display:flex;
    flex-direction:column;
    gap:16px;
    transition:border-color .18s ease, transform .18s ease;
    position:relative;
  }
  .plan:hover{
    border-color:var(--gold);
    transform:translateY(-3px);
  }
  .plan-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:19px;
  }
  .plan-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .price-row{
    display:flex;
    align-items:baseline;
    gap:6px;
    padding:6px 0 4px;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    margin:2px 0;
  }
  .price{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:30px;
    color:var(--gold-bright);
  }
  .price-note{
    font-size:12.5px;
    color:var(--muted);
  }
  .features{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:9px;
    flex-grow:1;
  }
  .features li{
    font-size:13.5px;
    color:#c7c8cd;
    display:flex;
    gap:8px;
    line-height:1.4;
  }
  .features li::before{
    content:"✓";
    color:var(--green);
    font-weight:600;
    flex-shrink:0;
  }
  .buy-btn{
    display:block;
    text-align:center;
    padding:13px 16px;
    border-radius:8px;
    font-weight:600;
    font-size:14px;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold-bright);
    transition:background .18s ease, color .18s ease;
  }
  .buy-btn:hover{
    background:var(--gold);
    color:#0b0c0f;
  }

  /* ---------- Bundle (featured) ---------- */
  .plan.bundle{
    background:linear-gradient(180deg, rgba(201,162,78,0.09), var(--surface) 60%);
    border:1px solid var(--gold);
    grid-column:span 1;
  }
  .best-value{
    position:absolute;
    top:-11px;
    right:20px;
    background:var(--gold);
    color:#0b0c0f;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:0.05em;
    padding:4px 10px;
    border-radius:20px;
    text-transform:uppercase;
  }
  .plan.bundle .buy-btn{
    background:var(--gold);
    color:#0b0c0f;
  }
  .plan.bundle .buy-btn:hover{
    background:var(--gold-bright);
  }
  .save-line{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--green);
  }

  /* ---------- Trust row ---------- */
  .trust{
    max-width:1100px;
    margin:8px auto 0;
    padding:22px 24px;
    display:flex;
    justify-content:center;
    gap:36px;
    flex-wrap:wrap;
    border-top:1px solid var(--border);
  }
  .trust-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12.5px;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
  }
  .trust-item b{ color:var(--gold); }

  /* ---------- Footer ---------- */
  footer{
    border-top:1px solid var(--border);
    padding:28px 24px 40px;
    max-width:1100px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
  }
  footer .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:14px;
  }
  footer .brand span{ color:var(--gold); }
  footer p{
    font-size:12px;
    color:var(--muted);
  }

  /* ---------- Quotes strip ---------- */
  .quotes-strip{
    max-width:1100px;
    margin:0 auto;
    padding:30px 24px;
    border-top:1px solid var(--border);
    text-align:center;
  }
  .quote-box{
    min-height:70px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .quote-text{
    font-family:'Space Grotesk',sans-serif;
    font-size:17px;
    color:var(--text);
    max-width:640px;
    line-height:1.5;
    transition:opacity .4s ease;
  }
  .quote-author{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--gold);
    letter-spacing:0.05em;
    text-transform:uppercase;
    transition:opacity .4s ease;
  }
  .quote-fade{ opacity:0; }

  @media (max-width:640px){
    .trust{ gap:18px; }
  }

  /* ---------- Modal ---------- */
  .plan{ cursor:pointer; }
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(6,7,9,0.72);
    backdrop-filter:blur(3px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
  }
  .overlay.active{ display:flex; }
  .modal{
    background:var(--surface);
    border:1px solid var(--gold);
    border-radius:14px;
    max-width:420px;
    width:100%;
    padding:30px 26px 26px;
    position:relative;
    animation:modal-in .18s ease;
  }
  @keyframes modal-in{
    from{ opacity:0; transform:translateY(8px) scale(0.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .modal-close{
    position:absolute;
    top:14px; right:14px;
    width:30px; height:30px;
    border:1px solid var(--border);
    border-radius:50%;
    background:transparent;
    color:var(--muted);
    font-size:16px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:border-color .15s ease, color .15s ease;
  }
  .modal-close:hover{ border-color:var(--gold); color:var(--gold-bright); }
  .modal-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .modal-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:23px;
    margin-bottom:16px;
  }
  .modal-price-row{
    display:flex;
    align-items:baseline;
    gap:6px;
    padding:14px 0;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    margin-bottom:16px;
  }
  .modal-price{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:34px;
    color:var(--gold-bright);
  }
  .modal-save{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--green);
    margin:-10px 0 16px;
  }
  .modal-features{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:9px;
    margin-bottom:22px;
  }
  .modal-features li{
    font-size:13.5px;
    color:#c7c8cd;
    display:flex;
    gap:8px;
    line-height:1.4;
  }
  .modal-features li::before{
    content:"✓";
    color:var(--green);
    font-weight:600;
    flex-shrink:0;
  }
  .modal-buy{
    display:block;
    text-align:center;
    padding:14px 16px;
    border-radius:8px;
    font-weight:600;
    font-size:14.5px;
    background:var(--gold);
    color:#0b0c0f;
    transition:background .18s ease;
  }
  .modal-buy:hover{ background:var(--gold-bright); }
</style>
</head>
